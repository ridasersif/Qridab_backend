name: CI - Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    permissions:
      checks: write          # needed by dorny/test-reporter to post check results
      pull-requests: write   # needed to comment on pull requests
      contents: read

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (same as pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Run unit tests only (skip integration tests — none exist, but safe to keep)
      - name: Run Unit Tests
        run: ./mvnw test --no-transfer-progress
        env:
          # Dummy env vars so the app context doesn't fail if referenced
          SPRING_PROFILES_ACTIVE: test

      # 4. Publish test report as GitHub Actions summary
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      # 5. Show test summary in the PR/push page
      - name: Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true
